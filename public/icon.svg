<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background Rounded Rect with a modern gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fdba74" /> <!-- orange-300 -->
      <stop offset="100%" stop-color="#ea580c" /> <!-- orange-600 -->
    </linearGradient>
    <linearGradient id="glassGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85" />
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.3" /> <!-- sky-100 -->
    </linearGradient>
    <linearGradient id="glassGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.2" /> <!-- sky-200 -->
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#7c2d12" flood-opacity="0.25" />
    </filter>
    <filter id="glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#ffffff" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- Main Rounded Container -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGrad)" />

  <!-- Inner Subtle Border -->
  <rect x="44" y="44" width="424" height="424" rx="100" fill="none" stroke="#ffedd5" stroke-width="6" stroke-opacity="0.3" />

  <!-- The "Glass Panels" Design -->
  <g filter="url(#shadow)">
    <!-- Back Panel - representing Glass Template -->
    <rect x="130" y="160" width="180" height="240" rx="24" transform="rotate(-12, 220, 280)" fill="url(#glassGrad2)" stroke="#ffffff" stroke-width="4" stroke-opacity="0.4" />
    
    <!-- Reflex / Highlight on Back Panel -->
    <path d="M 134 180 L 260 160 L 230 400 Z" fill="#ffffff" fill-opacity="0.1" pointer-events="none" />

    <!-- Front Panel - overlapping glass pane -->
    <rect x="200" y="130" width="180" height="240" rx="24" transform="rotate(8, 290, 250)" fill="url(#glassGrad1)" stroke="#ffffff" stroke-width="4" stroke-opacity="0.8" />
    
    <!-- Grid/Measurement Lines on the Front Glass Panel (giving it that glazier/technical vibe) -->
    <path d="M 230 140 L 230 360 M 350 140 L 350 360 M 210 200 L 370 200 M 210 300 L 370 300" 
          stroke="#0284c7" stroke-width="2.5" stroke-opacity="0.25" stroke-dasharray="6,6" transform="rotate(8, 290, 250)" />

    <!-- Sleek Diagonal Flare / Reflection reflection on front pane -->
    <path d="M 205 150 L 350 135 L 300 370 Z" fill="#ffffff" fill-opacity="0.15" pointer-events="none" />
  </g>

  <!-- Glass cutter or ruler corner scale element at the bottom -->
  <g transform="translate(64, 340)" opacity="0.85">
    <!-- Ruler-like tick marks along the bottom -->
    <path d="M 20 60 L 200 60 M 20 60 L 20 45 M 50 60 L 50 50 M 80 60 L 80 45 M 110 60 L 110 50 M 140 60 L 140 45 M 170 60 L 170 50 M 200 60 L 200 45" 
          stroke="#ffedd5" stroke-width="4.5" stroke-linecap="round" />
  </g>

  <!-- Shine effect sparkle -->
  <path d="M 390 120 L 400 140 L 420 150 L 400 160 L 390 180 L 380 160 L 360 150 L 380 140 Z" fill="#ffffff" filter="url(#glow)" />
</svg>
